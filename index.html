<!DOCTYPE html>
<html>
<head>
  <title>MineBerry SMP</title>

  <style>
    body {
      background: linear-gradient(to bottom, #121212, #1f1f1f);
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      width: 600px;
      margin: auto;
      padding: 40px;
      border-radius: 25px;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 60px;
      color: #ff5ca8;
    }

    p {
      font-size: 22px;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #ff5ca8;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
    }

    .button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🍓 MineBerry SMP</h1>

  <p>Survive • Build • Conquer</p>

  <p>
    IP: <b>play.mineberrymc.net</b>
  </p>

  <a class="button" href="https://discord.gg/YOURINVITE">
    Join Discord
  </a>
</div>

</body>
</html>
